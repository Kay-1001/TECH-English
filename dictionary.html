<style>
  :root {
    --paper: #faf8f3;

    --rule: #d4c8b0;
    --rule-soft: #e8dfc8;
    --accent: #8b3a1a;
    --accent-soft: #c97548;
    --highlight: #fef3c7;
    --highlight-deep: #fde68a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Noto Serif JP", "Hiragino Mincho ProN", "游明朝", serif;
    -webkit-font-smoothing: antialiased;
  }
  .font-display {
    font-family: "Cormorant Garamond", "Hiragino Mincho ProN", serif;
    font-weight: 600;
  }
  .font-mono {
    font-family: "JetBrains Mono", "SF Mono", "Menlo", monospace;
  }
  .font-sans {
    font-family: "Inter", -apple-system, "Hiragino Sans", sans-serif;
  }
  /* 紙のテクスチャ風 */
  .paper-grain {
    background-color: var(--paper);
    background-image:
      radial-gradient(circle at 20% 30%, rgba(139, 58, 26, 0.02) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(139, 58, 26, 0.015) 0%, transparent 40%);
  }
  /* 辞書見出し */
  .entry-headword {
    font-family: "Cormorant Garamond", "Hiragino Mincho ProN", serif;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .entry-pos {
    font-style: italic;
    color: var(--ink-faint);
    font-family: "Cormorant Garamond", serif;
  }
  /* カテゴリーバッジ */
  .cat-badge {
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 6px;
    border: 0.5px solid;
    display: inline-block;
  }
  .cat-tech { color: #1e3a5f; border-color: #1e3a5f; background: #e8eef5; }
  .cat-engineering { color: #6b3410; border-color: #6b3410; background: #f4e8db; }
  .cat-medical { color: #7a1f3a; border-color: #7a1f3a; background: #f5e3ea; }
  .cat-physics { color: #2a4a2c; border-color: #2a4a2c; background: #e0ecdf; }
  .cat-chemistry { color: #5d2e7a; border-color: #5d2e7a; background: #ede0f3; }
  .cat-biology { color: #1e5530; border-color: #1e5530; background: #dceadf; }
  .cat-energy { color: #7a4d10; border-color: #7a4d10; background: #f5ead0; }
  .cat-business { color: #3a3a3a; border-color: #3a3a3a; background: #ebe7df; }
  .cat-photography, .cat-optics { color: #4a3870; border-color: #4a3870; background: #e7e2f0; }
  .cat-astronomy { color: #1c3a4f; border-color: #1c3a4f; background: #d8e3eb; }
  .cat-weather, .cat-logistics { color: #4a4a3a; border-color: #4a4a3a; background: #ece9dc; }
  .cat-product { color: #4a2a4a; border-color: #4a2a4a; background: #ebdeec; }
  .cat-general { color: #5a5040; border-color: #5a5040; background: #efe9da; }
  /* エントリータイプバッジ */
  .type-target {
    background: var(--accent);
    color: var(--paper);
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    padding: 2px 6px;
    text-transform: uppercase;
  }
  .type-phrase {
    background: var(--ink);
    color: var(--paper);
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    padding: 2px 6px;
    text-transform: uppercase;
  }
  .type-word {
    border: 0.5px solid var(--ink-faint);
    color: var(--ink-faint);
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    padding: 2px 6px;
    text-transform: uppercase;
  }
  /* 区切り線 */
  .ornamental-rule {
    height: 1px;
    background: var(--rule);
    margin: 2rem 0;
    position: relative;
  }
  .ornamental-rule::after {
    content: "❦";
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: var(--paper);
    padding: 0 1rem;
    color: var(--accent-soft);
    font-size: 14px;
  }
  /* ボタン */
  .btn-voice {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    border: 0.5px solid var(--rule);
    background: var(--paper);
    color: var(--ink-soft);
    padding: 4px 8px;
    transition: all 0.15s;
    cursor: pointer;
    min-height: 28px;
  }
  .btn-voice:hover {
    background: var(--rule-soft);
    border-color: var(--ink-faint);
  }
  .btn-voice.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  /* フィルターチップ */
  .chip {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    padding: 6px 12px;
    border: 0.5px solid var(--rule);
    background: var(--paper);
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover {
    border-color: var(--ink-faint);
  }
  .chip.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  /* 検索ボックス */
  .search-box {
    font-family: "Cormorant Garamond", "Hiragino Mincho ProN", serif;
    font-size: 18px;
    border: none;
    border-bottom: 1px solid var(--ink);
    background: transparent;
    padding: 8px 0;
    width: 100%;
    color: var(--ink);
    outline: none;
  }
  .search-box::placeholder {
    color: var(--ink-faint);
    font-style: italic;
  }
  /* 例文 */
  .example-en {
    font-family: "Cormorant Garamond", "Hiragino Mincho ProN", serif;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 15px;
    line-height: 1.6;
  }
  .example-jp {
    font-size: 13px;
    color: var(--ink-faint);
    line-height: 1.6;
  }
  /* スクロールバー */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rule); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }
</style>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

// JSONデータの読み込み
const VOCAB_DATA = JSON.parse(document.getElementById("vocab-data").textContent);

// ─────────────────────────────────────────────────
// useSpeech フック
// ─────────────────────────────────────────────────
const useSpeech = () => {
  const [voices, setVoices] = useState([]);
  const [speakingId, setSpeakingId] = useState(null);
  const [rateMode, setRateMode] = useState("normal");

  useEffect(() => {
    if (!("speechSynthesis" in window)) return;
    const load = () => setVoices(window.speechSynthesis.getVoices());
    load();
    window.speechSynthesis.onvoiceschanged = load;
    return () => {
      window.speechSynthesis.onvoiceschanged = null;
      window.speechSynthesis.cancel();
    };
  }, []);

  const speak = (text, lang = "en-US", id = "x") => {
    if (!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = rateMode === "slow" ? 0.85 : 1.15;
    u.pitch = 1.0;
    const femalePattern = lang === "en-US"
      ? /female|samantha|victoria|karen|zira|allison|ava|jenny|aria/i
      : /female|kate|serena|moira|fiona|hazel|susan|emily/i;
    const preferred =
      voices.find(v => v.lang === lang && femalePattern.test(v.name)) ||
      voices.find(v => v.lang === lang) ||
      voices.find(v => v.lang.startsWith(lang.slice(0, 2)));
    if (preferred) u.voice = preferred;
    u.onstart = () => setSpeakingId(id);
    u.onend = () => setSpeakingId(null);
    u.onerror = () => setSpeakingId(null);
    window.speechSynthesis.speak(u);
  };

  const toggleRate = () => setRateMode(p => (p === "normal" ? "slow" : "normal"));
  return { speak, speakingId, rateMode, toggleRate };
};

// ─────────────────────────────────────────────────
// 全エントリーを統合形式に変換
// ─────────────────────────────────────────────────
const buildAllEntries = () => {
  const entries = [];
  // target_words
  VOCAB_DATA.target_words.items.forEach(item => {
    entries.push({
      type: "target",
      term: item.word,
      pos: item.pos,
      meaning: item.meaning_jp,
      category: "target_vocab",
      isReview: !!item.review_from_unit,
      id: item.id
    });
  });
  // phrases
  VOCAB_DATA.support_vocabulary.phrases.forEach(item => {
    entries.push({
      type: "phrase",
      term: item.term,
      pos: item.pos,
      meaning: item.meaning_jp,
      category: item.category,
      id: item.id
    });
  });
  // single_words
  VOCAB_DATA.support_vocabulary.single_words.forEach(item => {
    entries.push({
      type: "word",
      term: item.word,
      pos: item.pos,
      meaning: item.meaning_jp,
      category: item.category,
      id: item.id
    });
  });
  return entries;
};

const ALL_ENTRIES = buildAllEntries();

// ユニークなカテゴリ一覧
const ALL_CATEGORIES = [...new Set(ALL_ENTRIES.map(e => e.category))].sort();

// ─────────────────────────────────────────────────
// 音声ボタン
// ─────────────────────────────────────────────────
const VoiceButton = ({ text, lang, label, id, speak, speakingId }) => {
  const isActive = speakingId === id;
  return (
    <button
      onClick={() => speak(text, lang, id)}
      className={`btn-voice ${isActive ? "active" : ""}`}
    >
      🔊 {label}
    </button>
  );
};

// ─────────────────────────────────────────────────
// エントリーカード
// ─────────────────────────────────────────────────
const EntryCard = ({ entry, speak, speakingId }) => {
  const typeBadge = entry.type === "target"
    ? <span className="type-target">学習対象</span>
    : entry.type === "phrase"
      ? <span className="type-phrase">連語</span>
      : <span className="type-word">単語</span>;

  const catClass = `cat-${entry.category.replace(/_/g, "-")}`;

  return (
    <article className="py-5 border-b" style={{ borderColor: "var(--rule-soft)" }}>
      <div className="flex items-baseline gap-3 flex-wrap mb-2">
        <h3 className="entry-headword text-2xl" style={{ color: "var(--ink)" }}>
          {entry.term}
        </h3>
        <span className="entry-pos text-sm">{entry.pos}</span>
        {typeBadge}
        {entry.isReview && (
          <span className="text-[10px] font-mono" style={{ color: "var(--accent)" }}>
            🔁 復習
          </span>
        )}
      </div>
      <div className="text-base leading-relaxed mb-2" style={{ color: "var(--ink-soft)" }}>
        {entry.meaning}
      </div>
      <div className="flex items-center gap-2 flex-wrap">
        <span className={`cat-badge ${catClass}`}>{entry.category}</span>
        <div className="flex gap-1.5 ml-auto">
          <VoiceButton
            text={entry.term}
            lang="en-US"
            label="米"
            id={`${entry.id}-us`}
            speak={speak}
            speakingId={speakingId}
          />
          <VoiceButton
            text={entry.term}
            lang="en-GB"
            label="英"
            id={`${entry.id}-gb`}
            speak={speak}
            speakingId={speakingId}
          />
        </div>
      </div>
    </article>
  );
};

// ─────────────────────────────────────────────────
// アルファベット セクションヘッダー
// ─────────────────────────────────────────────────
const SectionHeader = ({ letter }) => (
  <div
    className="font-display text-5xl mt-12 mb-2 pb-2 border-b-2"
    style={{ color: "var(--accent)", borderColor: "var(--accent)" }}
  >
    {letter.toUpperCase()}
  </div>
);

// ─────────────────────────────────────────────────
// メインアプリ
// ─────────────────────────────────────────────────
function App() {
  const { speak, speakingId, rateMode, toggleRate } = useSpeech();
  const [search, setSearch] = useState("");
  const [typeFilter, setTypeFilter] = useState("all");
  const [categoryFilter, setCategoryFilter] = useState("all");
  const [sortMode, setSortMode] = useState("alpha");

  const filtered = useMemo(() => {
    return ALL_ENTRIES.filter(e => {
      if (search) {
        const q = search.toLowerCase();
        if (!e.term.toLowerCase().includes(q) && !e.meaning.includes(search)) {
          return false;
        }
      }
      if (typeFilter !== "all" && e.type !== typeFilter) return false;
      if (categoryFilter !== "all" && e.category !== categoryFilter) return false;
      return true;
    }).sort((a, b) => {
      if (sortMode === "alpha") return a.term.localeCompare(b.term);
      if (sortMode === "type") {
        const order = { target: 1, phrase: 2, word: 3 };
        return order[a.type] - order[b.type] || a.term.localeCompare(b.term);
      }
      if (sortMode === "category") {
        return a.category.localeCompare(b.category) || a.term.localeCompare(b.term);
      }
      return 0;
    });
  }, [search, typeFilter, categoryFilter, sortMode]);

  // アルファベット順表示時のグループ化
  const groupedByLetter = useMemo(() => {
    if (sortMode !== "alpha") return null;
    const groups = {};
    filtered.forEach(e => {
      const letter = e.term[0].toLowerCase();
      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(e);
    });
    return groups;
  }, [filtered, sortMode]);

  return (
    <div className="max-w-4xl mx-auto px-4 sm:px-8 py-8">
      {/* ヘッダー */}
      <header className="mb-8">
        <div className="flex items-start justify-between flex-wrap gap-4 mb-6">
          <div>
            <div
              className="text-[10px] font-mono tracking-[0.3em] uppercase mb-2"
              style={{ color: "var(--ink-faint)" }}
            >
              TECH-English · Lexicon
            </div>
            <h1
              className="font-display text-5xl sm:text-6xl"
              style={{ color: "var(--ink)" }}
            >
              辞 書
            </h1>
            <div
              className="text-sm mt-1 italic"
              style={{ color: "var(--ink-soft)" }}
            >
              Unit 2 — remain 他のSVC ／ 万能動詞 ／ 効果的な他動詞
            </div>
          </div>
          <div className="flex gap-2 flex-wrap items-start">
            <button
              onClick={toggleRate}
              className="chip"
              style={
                rateMode === "normal"
                  ? { background: "var(--ink)", color: "var(--paper)", borderColor: "var(--ink)" }
                  : { background: "#fef3c7", color: "var(--accent)", borderColor: "var(--accent)" }
              }
            >
              {rateMode === "normal" ? "⚡ 1.15×" : "🐢 0.85×"}
            </button>
            <a href="./" className="chip">
              🏠 Home
            </a>
          </div>
        </div>

        {/* 検索 */}
        <div className="mb-6">
          <input
            type="text"
            value={search}
            onChange={e => setSearch(e.target.value)}
            placeholder="Search · 単語または意味で検索"
            className="search-box"
          />
        </div>

        {/* フィルター */}
        <div className="space-y-3">
          {/* タイプフィルター */}
          <div className="flex items-center gap-2 flex-wrap">
            <span
              className="text-[10px] font-mono tracking-wider uppercase mr-2"
              style={{ color: "var(--ink-faint)" }}
            >
              Type
            </span>
            {[
              { value: "all", label: "ALL" },
              { value: "target", label: "学習対象" },
              { value: "phrase", label: "連語" },
              { value: "word", label: "単語" }
            ].map(opt => (
              <button
                key={opt.value}
                onClick={() => setTypeFilter(opt.value)}
                className={`chip ${typeFilter === opt.value ? "active" : ""}`}
              >
                {opt.label}
              </button>
            ))}
          </div>

          {/* ソート */}
          <div className="flex items-center gap-2 flex-wrap">
            <span
              className="text-[10px] font-mono tracking-wider uppercase mr-2"
              style={{ color: "var(--ink-faint)" }}
            >
              Sort
            </span>
            {[
              { value: "alpha", label: "A→Z" },
              { value: "type", label: "種類別" },
              { value: "category", label: "カテゴリ別" }
            ].map(opt => (
              <button
                key={opt.value}
                onClick={() => setSortMode(opt.value)}
                className={`chip ${sortMode === opt.value ? "active" : ""}`}
              >
                {opt.label}
              </button>
            ))}
          </div>

          {/* カテゴリフィルター */}
          <div className="flex items-center gap-2 flex-wrap">
            <span
              className="text-[10px] font-mono tracking-wider uppercase mr-2"
              style={{ color: "var(--ink-faint)" }}
            >
              Category
            </span>
            <button
              onClick={() => setCategoryFilter("all")}
              className={`chip ${categoryFilter === "all" ? "active" : ""}`}
            >
              ALL
            </button>
            {ALL_CATEGORIES.map(cat => (
              <button
                key={cat}
                onClick={() => setCategoryFilter(cat)}
                className={`chip ${categoryFilter === cat ? "active" : ""}`}
                style={{ fontSize: "10px" }}
              >
                {cat}
              </button>
            ))}
          </div>
        </div>

        {/* 統計 */}
        <div
          className="mt-6 pt-4 border-t flex items-baseline gap-4 flex-wrap"
          style={{ borderColor: "var(--rule)" }}
        >
          <div className="font-mono text-xs" style={{ color: "var(--ink-faint)" }}>
            <span className="text-2xl font-display" style={{ color: "var(--ink)" }}>
              {filtered.length}
            </span>
            <span className="ml-1">/ {ALL_ENTRIES.length} entries</span>
          </div>
          <div className="text-[10px] font-mono uppercase tracking-wider" style={{ color: "var(--ink-faint)" }}>
            target {ALL_ENTRIES.filter(e => e.type === "target").length} ·
            phrase {ALL_ENTRIES.filter(e => e.type === "phrase").length} ·
            word {ALL_ENTRIES.filter(e => e.type === "word").length}
          </div>
        </div>
      </header>

      <div className="ornamental-rule"></div>

      {/* エントリーリスト */}
      <main>
        {filtered.length === 0 ? (
          <div
            className="text-center py-16 italic"
            style={{ color: "var(--ink-faint)" }}
          >
            該当するエントリーが見つかりませんでした。
          </div>
        ) : sortMode === "alpha" ? (
          Object.keys(groupedByLetter).sort().map(letter => (
            <section key={letter}>
              <SectionHeader letter={letter} />
              {groupedByLetter[letter].map(entry => (
                <EntryCard
                  key={entry.id}
                  entry={entry}
                  speak={speak}
                  speakingId={speakingId}
                />
              ))}
            </section>
          ))
        ) : (
          filtered.map(entry => (
            <EntryCard
              key={entry.id}
              entry={entry}
              speak={speak}
              speakingId={speakingId}
            />
          ))
        )}
      </main>

      <div className="ornamental-rule"></div>

      {/* フッター */}
      <footer
        className="text-center text-[10px] font-mono tracking-wider mt-8"
        style={{ color: "var(--ink-faint)" }}
      >
        © 2026 Kaoruko Takechi · All rights reserved.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
